baseURL = "https://mbreaux622.github.io/"
languageCode = "en-us"
title = "Mark Breaux | Senior Information Architect"
theme = "hugo-profile"

[params]
  title = "Mark Breaux"
  description = "Senior Information Architect specializing in DITA, content strategy, and AI-ready documentation systems."
  favicon = "/favicon.ico"

  # Hero section (home page)
  [params.hero]
    enable = true
    intro = "Hi, I'm"
    title = "Mark Breaux"
    subtitle = "Senior Information Architect"
    content = "I design the systems that make complex technical content findable, scalable, and future-ready. 21 years building enterprise documentation architecture at NI."
    # image = "/images/headshot.jpg"   # uncomment and add a headshot to /static/images/

    [params.hero.button]
      enable = true
      name = "View Resume"
      url = "/resume"

    [[params.hero.socialLinks.fontAwesomeIcons]]
      icon = "fab fa-linkedin"
      url = "https://linkedin.com/in/[YOUR-LINKEDIN-HANDLE]"

    [[params.hero.socialLinks.fontAwesomeIcons]]
      icon = "fab fa-github"
      url = "https://github.com/[YOUR-GITHUB-USERNAME]"

  # About section
  [params.about]
    enable = true
    title = "About Me"
    image = "/images/headshot.jpg"   # optional
    content = """
For 21 years, I've been the person organizations call when they need to make sense of complexity —
to look at a sprawling content ecosystem, understand the underlying structure, and build something that scales.

As a Senior Information Architect at NI, I own the content model, metadata standards, DITA architecture,
and toolchain strategy behind documentation for a portfolio of nearly 5,000 products.
My work spans strategy and implementation: reducing a documentation library from 1.1 million pages to 250,000,
leading AI and LLM content readiness initiatives, and supporting a community of 30–50 technical writers globally.
"""

    [params.about.skills]
      enable = true
      title = "Core Competencies"
      items = [
        "Information Architecture",
        "DITA & Structured Content",
        "Content Strategy & Modeling",
        "Metadata & Taxonomy Design",
        "AI/LLM Content Readiness",
        "DITA Open Toolkit Customization",
        "Schema.org / Structured Data",
        "SEO / AEO Optimization",
        "Omnichannel Publishing",
        "Localization Strategy",
        "CCMS Architecture",
        "Stakeholder Influence & Alignment"
      ]

  # Portfolio/Case Studies section
  [params.projects]
    enable = true
    title = "Case Studies"

    [[params.projects.items]]
      title = "Evergreen Content Strategy"
      content = "Reduced product documentation from 1.1 million pages to 250,000 through an enterprise evergreen content model — improving findability, SEO, and consistency across a portfolio of nearly 5,000 products."
      # image = "/images/case-study-evergreen.png"
      # url = "/portfolio/evergreen-content-strategy"  # uncomment when case study page is ready

    [[params.projects.items]]
      title = "AI Content Readiness"
      content = "Pioneered documentation architecture for AI and LLM consumption: automated short-description enrichment, schema.org structured data injection, normalized content exports, and a custom AI prompt library for 30–50 writers."
      # url = "/portfolio/ai-content-readiness"

    [[params.projects.items]]
      title = "User Manual Standardization"
      content = "Designed and implemented a consistent User Manual structure across all hardware and software product lines, informed by user research. Eliminated competing search results and created a predictable documentation experience for customers."
      # url = "/portfolio/user-manual-standardization"

    [[params.projects.items]]
      title = "PDF Automation with Miramo"
      content = "Identified and implemented Miramo as an automated PDF generation solution integrated with the DITA Open Toolkit, removing a manual bottleneck in documentation delivery to global distribution partners."
      # url = "/portfolio/miramo-pdf-automation"

  # Experience section
  [params.experience]
    enable = true

    [[params.experience.items]]
      job = "Senior Information Architect"
      company = "NI (formerly National Instruments)"
      companyUrl = "https://www.ni.com"
      date = "April 2017 – Present"
      content = """
Lead information architecture strategy for a global, multilingual documentation organization.
Define and maintain the content model, metadata standards, DITA templates, and toolchain strategy
supporting documentation for a portfolio of nearly 5,000 products.
"""

    [[params.experience.items]]
      job = "Senior Technical Writer"
      company = "NI"
      companyUrl = "https://www.ni.com"
      date = "April 2012 – April 2017"
      content = "Served as technical lead during enterprise DITA adoption. Built DITA specializations, DITA-OT customizations, and the organization's PDF plugin."

    [[params.experience.items]]
      job = "Staff Technical Writer"
      company = "NI"
      companyUrl = "https://www.ni.com"
      date = "December 2007 – April 2012"
      content = "Helped pilot and prove DITA viability for the organization, laying the groundwork for enterprise-wide adoption."

    [[params.experience.items]]
      job = "Technical Writer"
      company = "NI"
      companyUrl = "https://www.ni.com"
      date = "May 2005 – December 2007"
      content = "Authored documentation for vision systems, hardware, software, APIs, and device drivers. Created the organization's first .NET API reference."

  # Contact section
  [params.contact]
    enable = true
    title = "Get In Touch"
    content = "I'm open to discussing senior information architecture, content strategy, and documentation leadership roles. Feel free to reach out."
    email = "[YOUR-EMAIL]"
    btnName = "Email Me"

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/#about"
    weight = 1

  [[menu.main]]
    identifier = "experience"
    name = "Experience"
    url = "/#experience"
    weight = 2

  [[menu.main]]
    identifier = "portfolio"
    name = "Portfolio"
    url = "/#projects"
    weight = 3

  [[menu.main]]
    identifier = "resume"
    name = "Resume"
    url = "/resume"
    weight = 4

  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/#contact"
    weight = 5
